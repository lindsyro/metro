services:
  app:
    build: .
    container_name: metro_bot
    restart: unless-stopped
    ports:
      - "5555:5555"
    env_file:
      - .env

    depends_on:
      db:
        condition: service_healthy
      proxy:
        condition: service_started
    # Создаем/синхронизируем таблицы перед запуском
    command: sh -c "npx prisma db push && npm start"
    # command: tail -f /dev/null

  db:
    image: postgres:15-alpine
    container_name: metro_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-metro_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-metro_db}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- НАШ НОВЫЙ КОНТЕЙНЕР С ПРОКСИ ---
  proxy:
    image: debian:bookworm-slim
    container_name: transport_proxy
    restart: unless-stopped
    volumes:
      # Прокидываем исполняемый файл в контейнер
      - ./opera-proxy.linux-amd64-no-fix:/usr/local/bin/opera-proxy:ro
    command: /usr/local/bin/opera-proxy -country EU -bind-address 0.0.0.0:18080

volumes:
  postgres_data:
