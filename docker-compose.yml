version: '3.8'

services:
  app:
    build: .
    container_name: metro_bot
    restart: unless-stopped
    env_file:
      - .env
    # DATABASE_URL будет автоматически взят из .env файла
    depends_on:
      db:
        condition: service_healthy
    # Создаем/синхронизируем таблицы перед запуском
    command: sh -c "npx prisma db push && npm start"

  db:
    image: postgres:15-alpine
    container_name: metro_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-metro_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-metro_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
